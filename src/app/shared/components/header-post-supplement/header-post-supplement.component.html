<div class="row">
    <div class="col-md-5 d-flex flex-column">
        <div>
            <img *ngIf="rutaIcono()" [src]="rutaIcono()" alt="" height="50" width="auto" class="drop">
        </div>
        <div class="espacio"></div>
        <br>
        <div class="d-flex">
            <time class="tc-gray-two f-shadow-into-l fs-20 lh-20 m-0 p-0 texto-lateral m-0">
                {{ fecha() | date }}
            </time>
        </div>
        <div class="espaciado"></div>

    </div>
    <div class="col-md-7">
        <h1 class="tituloPost fuenteOcho pb-2 mb-4">{{ titulo() }}</h1>

        <p *ngFor="let contenido of descripcion()" id="description" class="c7 f-open-sans-c fs-20 lh-25">
            {{ contenido }}
        </p>

    </div>
</div>
