@if (mostrarItemsPorPantalla) {
<div class="d-flex justify-content-center fuenteDos">
    <select (change)="cargarCantidadElementos($event)">
        @for (valor of itemsPorPantalla; track valor) {
        <option value="{{ valor }}">{{ valor }}</option>
        }
    </select>
</div>
}
<div class="row mt-3">
    <div class="col-md-1"></div>
    <div class="col-md-10">
        <div class="row text-center">
            @for (pages of totalPaginas(); track pages.pagina) {
            <a (click)="cargarPagina(pages.pagina)" class="cursor-p col text-light">
                <p class="ml-3 d-block f-shadow-into-l fs-25 text-shadow" [class.active]="active() === pages.pagina.toString()">{{ pages.pagina + 1 }}</p>
            </a>
            }
        </div>
    </div>
    <div class="col-md-1 text-light"></div>
</div>
