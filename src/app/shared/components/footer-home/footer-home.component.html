<div class="row" id="contact">
    <div class="col-md-1"></div>
    <div class="col-md-10">
        <div class="row">
            <div class="col-md-6 pe-5">
                    <h2 class="fuenteOcho text-light m-0 fs-40">{{ 'titulo_blog' | translate }}</h2>
                    <br>
                    <p class="f-open-sans-c c7">{{ 'Presentacion' | translate }}</p>

                <img src="assets/img/author.png" alt="" width="auto" height="90" class="rounded-circle mx-1 border">
                <a href="/about">
                    <img src="assets/img/firma5.png" alt="" width="auto" height="60" class="mt-5">
                </a>

            </div>
            <div class="col-md-6">
                <div class="text-center">
                    <div class="form-group f-open-sans-c">
                        <form [formGroup]="formContact">
                            <input type="email" class="form-control tc-yellow-two" id="email"
                                placeholder="{{ 'Email' | translate }}" formControlName="email">
                            <textarea class="form-control tc-yellow-two" id="texarea" rows="3"
                                placeholder="{{ 'Comentarios' | translate }}" formControlName="comentarios"></textarea>
                            <button type="submit" id="bt-enviar" class="p-2 btn-block bg-warning sombraUno w-100"
                                (click)="enviar()">{{ 'Enviar' | translate }}</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-1"></div>
</div>
<div class="espacio"></div>
