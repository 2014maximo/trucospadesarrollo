<div *ngIf="estado === 'cargando'" class="row mt-5">
  <div class="col-12 text-center">
    <p>{{ 'PHRASES.loading' | translate }}</p>
  </div>
</div>

<div *ngIf="estado === 'error'" class="row mt-5">
  <div class="col-12 text-center">
    <p class="text-danger">{{ 'PHRASES.error' | translate }}</p>
  </div>
</div>

<div *ngIf="estado === 'listo'" class="row mt-5">
    <div class="col-md-3"></div>
    <div class="col-md-8 d-flex justify-content-end">
        <div class="parchment p-5" style='background-image:url("assets/img/banner/parchment.png");background-repeat:no-repeat;background-size:contain;'>
            <h2 class="comillas text-left">"</h2>
            <h4 class="f-open-sans-c text-center fs-30 lh-30 text-phrases">{{ displayPhrase }}</h4>
            <h2 class="text-author f-alex-brush fs-50 text-center">{{ displayAuthor }}</h2>
            <div class="espaciado"></div>
        </div>

    </div>
    <div class="col-md-1"></div>
</div>
<div *ngIf="estado === 'listo'" class="espaciado d-none d-md-block"></div>
