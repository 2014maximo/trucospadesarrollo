<div class="row bg-transparent skills">
    <div class="col-md-2"></div>
    <div class="col-md-8">
        <h3 class="title-block text-center">{{ 'habilidades' | translate }}</h3>
        <div class="bg-dark shadow-three mt-2 remove-padding">
            <ul class="nav nav-tabs f-open-sans-c" id="myTab" role="tablist">
                <li class="nav-item" role="presentation">
                    <button type="button" class="btn btn-outline-secondary active mb-1 me-1">
                        <i class="bi bi-caret-up text-light" id="home-tab" data-bs-toggle="tab" data-bs-target="#home-tab-pane" role="tab" aria-controls="home-tab-pane" aria-selected="true"></i>
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button type="button" class="btn btn-outline-secondary mb-1">
                        <i class="bi bi-caret-down text-light" id="profile-tab" data-bs-toggle="tab" data-bs-target="#profile-tab-pane" role="tab" aria-controls="profile-tab-pane" aria-selected="true"></i>
                    </button>
                </li>
            </ul>
            <div class="tab-content" id="myTabContent">
                <div class="tab-pane fade show active" id="home-tab-pane" role="tabpanel" aria-labelledby="home-tab" tabindex="0">
                    <div class="row pb-1 pt-5">
                        <div class="col p-4 text-center"><img src="assets/img/portfolio/logos/html-white.png" class="drop" alt="logo-html" height="40" width="auto"></div>

                        <div class="col p-4 text-center"><img src="assets/img/portfolio/logos/redux.png" class="drop" alt="logo-redux" height="40" width="auto"></div>
                        <div class="col p-4 text-center"><img src="assets/img/portfolio/logos/primeng.png" class="drop" alt="logo-primeNg" height="40" width="auto"></div>
                        <div class="col p-4 text-center"><img src="assets/img/portfolio/logos/ionic.png" class="drop" alt="logo-ionic" height="40" width="auto"></div>

                        <div class="col p-4 text-center"><img src="assets/img/portfolio/logos/php.png" class="drop" alt="logo-php" height="40" width="auto"></div>
